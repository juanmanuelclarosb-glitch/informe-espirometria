name: Compilar APK de Espirometría
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar archivos
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas de compilación
        run: |
          pip install flet
          pip install python-docx
          pip install requests

      - name: Crear Aplicación Android (.apk)
        run: |
          flet build apk

      - name: Guardar el instalador final
        uses: actions/upload-artifact@v4
        with:
          name: Aplicacion-Espirometria-APK
          path: build/apk/*.apk
